<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ 로또</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <button id="theme-toggle" class="header-btn">다크 모드</button>
        <button id="partnership-inquiry-btn" class="header-btn">제휴 문의</button>
    </header>

    <div class="main-content-sections">
        <div class="container"> <!-- Reverted from lotto-container -->
            <div id="message-output" class="message-output"></div>
            <h1>MZ 로또</h1>
            <div class="lotto-numbers"></div>
            <button class="generate-btn">번호 생성</button>
        </div>

        <div class="container dinner-recommendation-container">
            <h2>오늘 저녁 뭐 먹지?</h2>
            <div id="recommended-menu" class="recommended-menu">추천 메뉴를 받아보세요!</div>
            <button id="recommend-dinner-btn" class="recommend-btn">메뉴 추천 받기</button>
        </div>
    </div>

    <div id="partnership-inquiry-modal" class="modal">
        <div class="container contact-form-container">
            <button class="close-modal-btn">&times;</button>
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xwvanwko" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">이름:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일:</label>
                    <input type="email" id="email" name="_replyto" required>
                </div>
                <div class="form-group">
                    <label for="message">메시지:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
